  sc+=`<div class="sk" style="border:1px solid #0B539430"><div class="sh" style="background:#0B539408;border-bottom:1px solid #0B539420"><div class="shl"><span class="si">◆</span><div><div class="st" style="color:var(--brand-dark)">Unidades Diamante</div><div class="ss">Top 10 por nota IPR com todos os critérios habilitadores atendidos</div></div></div><div class="sn" style="background:var(--brand-dark)">${dia.length}</div></div>${tH()}${dia.length===0?'<div class="em">Nenhuma unidade no top 10 atende a todos os critérios</div>':dia.map((u,i)=>rw(u,i+1,false,'dia')).join('')}</div>`;
  sc+=`<div class="sk" style="border:1px solid #E6510030"><div class="sh" style="background:#E6510008;border-bottom:1px solid #E6510020"><div class="shl"><span class="si">◇</span><div><div class="st" style="color:var(--warn)">Potenciais Diamante</div><div class="ss">Top 10 por nota IPR, porém com critério(s) habilitador(es) pendente(s)</div></div></div><div class="sn" style="background:var(--warn)">${pot.length}</div></div>${tH()}${pot.length===0?'<div class="em">Todas do top 10 atendem aos critérios</div>':pot.map((u,i)=>rw(u,dia.length+i+1,true,'pot')).join('')}</div>`;
  sc+=`<div class="sk" style="border:1px solid #1268B330"><div class="sh" style="background:#1268B308;border-bottom:1px solid #1268B320"><div class="shl"><span class="si">📊</span><div><div class="st" style="color:var(--brand)">Top 10 por Nota IPR</div><div class="ss">Maiores notas independentemente dos critérios habilitadores</div></div></div><div class="sn" style="background:var(--brand)">10</div></div>${tH()}${t10.map((u,i)=>rw(u,i+1,true,'t10')).join('')}</div>`;
  document.getElementById('sec').innerHTML=sc;
  const sr=(document.getElementById('si')?.value||'').toLowerCase();
  const fl=sr?all.filter(u=>u.name.toLowerCase().includes(sr)):all;
  document.getElementById('rs').innerHTML=fl.map(u=>{const r=all.indexOf(u)+1;return rw(u,r,true,'full');}).join('');
  document.getElementById('ftr').textContent=`${U.length} unidades • Dados base 2025 • Simulação para classificação 2027 • Notas C1–C3 via quintis • C4 = QIM÷20`;
}
function sT(t){aT=t;R();}
function aR(k,d){wR[k]=Math.max(0,Math.min(5,wR[k]+d));R();}
function aw(p,k,d){const w=p==='ipeo'?wE:wA;w[k]=Math.max(0,Math.min(5,w[k]+d));R();}
const PP={ipeo:[{MI:1,MC:1,PR:1,AA:1,IEC:1},{MI:1,MC:1,PR:1,AA:1,IEC:3},{MI:2,MC:1,PR:2,AA:2,IEC:3}],ipa:[{C1:1,C2:1,C3:1,C4:1},{C1:1,C2:1,C3:1,C4:3},{C1:2,C2:2,C3:2,C4:1}]};
function ps(p,i){if(p==='ipeo')wE={...PP.ipeo[i]};else wA={...PP.ipa[i]};R();}
